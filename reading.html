<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Reading | The Order of the White Cat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #faf9f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }
        
        .cat-icon { text-align: center; font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 32px; text-align: center; margin-bottom: 8px; color: #1a1a1a; }
        .subtitle { text-align: center; color: #666; margin-bottom: 40px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
        .required { color: #d46b5e; margin-left: 4px; }
        .optional { color: #999; font-weight: normal; font-size: 12px; margin-left: 8px; }
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: #faf9f6;
            border: 1px solid #e8e5df;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #d46b5e; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        button {
            width: 100%;
            padding: 16px;
            background: #d46b5e;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #b85c50; }
        .preview-section { margin-top: 40px; padding: 32px; background: #faf9f6; border-radius: 24px; display: none; }
        .donation-options { display: flex; gap: 16px; margin-top: 24px; }
        .donation-btn {
            flex: 1;
            text-align: center;
            padding: 14px;
            background: #d46b5e;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .donation-btn:hover { background: #b85c50; }
        hr { border: none; border-top: 1px solid #e8e5df; margin: 24px 0; }
        .back-link { display: inline-block; margin-top: 24px; color: #999; text-decoration: none; }
        .share-buttons { margin-top: 24px; text-align: center; padding-top: 20px; border-top: 1px solid #e8e5df; }
        .share-btn {
            display: inline-block;
            padding: 8px 20px;
            margin: 0 8px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .share-twitter { background: #1DA1F2; color: white; }
        .share-facebook { background: #4267B2; color: white; }
        .share-wa { background: #25D366; color: white; }
        @media (max-width: 600px) {
            .container { padding: 32px 24px; }
            .row { grid-template-columns: 1fr; }
            .donation-options { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cat-icon">🐱🔮</div>
        <h1>Your Personal Reading</h1>
        <div class="subtitle">Enter your details for an accurate reading</div>
        
        <form id="readingForm">
            <div class="form-group">
                <label>📧 Your Email Address <span class="required">*</span></label>
                <input type="email" id="email" placeholder="where should we send your report?" required>
            </div>
            
            <div class="form-group">
                <label>Full Name <span class="required">*</span></label>
                <input type="text" id="fullName" placeholder="e.g., Sarah Johnson" required>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Birth Date <span class="required">*</span></label>
                    <input type="date" id="birthDate" required>
                </div>
                <div class="form-group">
                    <label>Birth Time <span class="optional">(optional)</span></label>
                    <input type="time" id="birthTime">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Birth City <span class="required">*</span></label>
                    <input type="text" id="birthCity" placeholder="e.g., New York" required>
                </div>
                <div class="form-group">
                    <label>Birth Country <span class="required">*</span></label>
                    <select id="birthCountry" required>
                        <option value="">Select country</option>
                        <option value="USA">United States</option>
                        <option value="UK">United Kingdom</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                        <option value="Singapore">Singapore</option>
                        <option value="Malaysia">Malaysia</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Gender <span class="optional">(optional)</span></label>
                <select id="gender">
                    <option value="">Prefer not to say</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            
            <button type="button" onclick="showPreview()">🔮 Get My Free Preview</button>
        </form>
        
        <div id="previewSection" class="preview-section">
            <hr>
            <div id="previewContent"></div>
            <hr>
            <div class="donation-options">
                <a href="#" id="donateIndividualBtn" class="donation-btn">☕ Donate $5<br><small>Full Report</small></a>
                <a href="#" id="donateCoupleBtn" class="donation-btn">💑 Donate $9<br><small>Couple Report</small></a>
            </div>
            
            <div class="share-buttons" id="shareButtons" style="display: none;">
                <p>✨ Found this helpful? Share with friends ✨</p>
                <a href="#" id="shareTwitter" class="share-btn share-twitter" target="_blank">🐦 Twitter</a>
                <a href="#" id="shareFacebook" class="share-btn share-facebook" target="_blank">📘 Facebook</a>
                <a href="#" id="shareWhatsApp" class="share-btn share-wa" target="_blank">💬 WhatsApp</a>
            </div>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>
    
    <script>
        function getZodiac(year) {
            const animals = ['Monkey', 'Rooster', 'Dog', 'Pig', 'Rat', 'Ox', 'Tiger', 'Rabbit', 'Dragon', 'Snake', 'Horse', 'Goat'];
            return animals[year % 12];
        }
        
        function getElement(year) {
            const elements = ['Wood', 'Wood', 'Fire', 'Fire', 'Earth', 'Earth', 'Metal', 'Metal', 'Water', 'Water'];
            return elements[year % 10];
        }
        
        // Generate a unique session ID
        function generateSessionId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        function showPreview() {
            const email = document.getElementById('email').value;
            const name = document.getElementById('fullName').value;
            const birthDate = document.getElementById('birthDate').value;
            const birthCity = document.getElementById('birthCity').value;
            const birthCountry = document.getElementById('birthCountry').value;
            
            if (!email || !name || !birthDate || !birthCity || !birthCountry) {
                alert('Please fill in all required fields (*) including your email');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                alert('Please enter a valid email address');
                return;
            }
            
            const year = parseInt(birthDate.split('-')[0]);
            const zodiac = getZodiac(year);
            const element = getElement(year);
            const birthPlace = `${birthCity}, ${birthCountry}`;
            
            const previewHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 48px;">🐱✨</div>
                    <h3 style="color: #d46b5e; margin-bottom: 8px;">Hello, ${name}</h3>
                    <p style="color: #666; margin-bottom: 24px;">${birthDate} • ${birthPlace}</p>
                    <p style="color: #999; font-size: 12px; margin-bottom: 16px;">📧 Report will be sent to: ${email}</p>
                    
                    <div style="background: white; padding: 24px; border-radius: 20px; margin-bottom: 24px;">
                        <p style="font-size: 28px; margin-bottom: 8px;">🌟 ${zodiac}</p>
                        <p style="color: #d46b5e; font-weight: 600;">${element} Element</p>
                    </div>
                    
                    <div style="text-align: left;">
                        <p><strong>💖 Love insight:</strong> ${element === 'Fire' ? 'You attract partners with passionate energy.' : element === 'Water' ? 'You need emotional depth and understanding.' : element === 'Wood' ? 'Growth and adventure matter most to you.' : element === 'Metal' ? 'Loyalty and strength define your relationships.' : 'Stability and comfort are your love language.'}</p>
                        <p style="margin-top: 16px;"><strong>💼 Career insight:</strong> ${element === 'Fire' ? 'Creative fields or leadership roles suit you.' : element === 'Water' ? 'Communication, travel, or healing professions.' : element === 'Wood' ? 'Education, planning, or growth-oriented work.' : element === 'Metal' ? 'Law, engineering, or precision-based careers.' : 'Real estate, finance, or nurturing roles.'}</p>
                    </div>
                    
                    <div style="background: rgba(212,107,94,0.1); padding: 16px; border-radius: 16px; margin-top: 24px;">
                        <p style="font-size: 14px; color: #d46b5e;">⭐ Your 2026 Forecast: A year of transformation ⭐</p>
                    </div>
                    
                    <p style="margin-top: 24px; font-size: 14px; color: #d46b5e;">
                        ✨ Full report includes BaZi analysis, monthly forecasts, lucky elements & more ✨
                    </p>
                </div>
            `;
            
            document.getElementById('previewContent').innerHTML = previewHTML;
            document.getElementById('previewSection').style.display = 'block';
            document.getElementById('shareButtons').style.display = 'block';
            
            // Generate session ID for this reading
            const sessionId = generateSessionId();
            
            // Store all user data with session ID
            const userData = {
                sessionId: sessionId,
                email: email,
                name: name,
                birthDate: birthDate,
                birthTime: document.getElementById('birthTime').value,
                birthPlace: birthPlace,
                gender: document.getElementById('gender').value,
                zodiac: zodiac,
                element: element,
                reportType: 'individual'
            };
            
            // Store in localStorage with the session ID as key
            localStorage.setItem(`pending_${sessionId}`, JSON.stringify(userData));
            
            // Create Ko-fi donation links with session ID and email
            // REPLACE YOUR_KOFI_USERNAME with your actual Ko-fi username
            const kofiUsername = 'nhomme';
            
            const individualUrl = `https://ko-fi.com/${kofiUsername}?amount=5&message=Reading%20for%20${encodeURIComponent(email)}%20Session:${sessionId}`;
            const coupleUrl = `https://ko-fi.com/${kofiUsername}?amount=9&message=Couple%20Reading%20for%20${encodeURIComponent(email)}%20Session:${sessionId}`;
            
            document.getElementById('donateIndividualBtn').href = individualUrl;
            document.getElementById('donateCoupleBtn').href = coupleUrl;
            
            // Share buttons
            const siteUrl = window.location.origin;
            const shareText = `I just got my reading from The Order of the White Cat! 🐱🔮 I'm a ${zodiac} (${element} element). Get yours here: ${siteUrl}`;
            document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
            document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(siteUrl)}&quote=${encodeURIComponent(shareText)}`;
            document.getElementById('shareWhatsApp').href = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
        }
    </script>
</body>
</html>
