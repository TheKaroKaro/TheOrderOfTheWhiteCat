<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Reading | The Order of the White Cat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #faf9f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }
        
        .cat-icon { text-align: center; font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 32px; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 40px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        .required { color: #d46b5e; margin-left: 4px; }
        .optional { color: #999; font-weight: normal; font-size: 12px; margin-left: 8px; }
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: #faf9f6;
            border: 1px solid #e8e5df;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #d46b5e; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        button {
            width: 100%;
            padding: 16px;
            background: #d46b5e;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #b85c50; }
        .preview-section { margin-top: 40px; padding: 32px; background: #faf9f6; border-radius: 24px; display: none; }
        .donation-options { display: flex; gap: 16px; margin-top: 24px; justify-content: center; }
        .donation-btn {
            padding: 14px 32px;
            background: #d46b5e;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
        }
        .donation-btn:hover { background: #b85c50; }
        hr { border: none; border-top: 1px solid #e8e5df; margin: 24px 0; }
        .back-link { display: inline-block; margin-top: 24px; color: #999; text-decoration: none; }
        .person-section { background: #faf9f6; padding: 24px; border-radius: 20px; margin-bottom: 24px; }
        .person-title { color: #d46b5e; margin-bottom: 16px; font-size: 18px; font-weight: 600; }
        .share-buttons { margin-top: 24px; text-align: center; padding-top: 20px; border-top: 1px solid #e8e5df; }
        .share-btn {
            display: inline-block;
            padding: 8px 20px;
            margin: 0 8px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .share-twitter { background: #1DA1F2; color: white; }
        .share-facebook { background: #4267B2; color: white; }
        .share-wa { background: #25D366; color: white; }
        @media (max-width: 600px) {
            .container { padding: 32px 24px; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cat-icon">🐱💑✨</div>
        <h1>Couple Compatibility Reading</h1>
        <div class="subtitle">Discover the harmony between you and your partner</div>
        
        <div class="person-section">
            <div class="person-title">👤 Person 1 (You)</div>
            <div class="form-group"><label>📧 Your Email <span class="required">*</span></label><input type="email" id="email1" placeholder="where should we send the report?" required></div>
            <div class="form-group"><label>Full Name <span class="required">*</span></label><input type="text" id="name1" required></div>
            <div class="row">
                <div class="form-group"><label>Birth Date <span class="required">*</span></label><input type="date" id="birthDate1" required></div>
                <div class="form-group"><label>Birth Time <span class="optional">(optional)</span></label><input type="time" id="birthTime1"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Birth City <span class="required">*</span></label><input type="text" id="city1" required></div>
                <div class="form-group"><label>Birth Country <span class="required">*</span></label>
                    <select id="country1" required><option value="">Select</option><option>USA</option><option>UK</option><option>Canada</option><option>Australia</option><option>Singapore</option><option>Malaysia</option></select>
                </div>
            </div>
        </div>
        
        <div class="person-section">
            <div class="person-title">💑 Person 2 (Your Partner)</div>
            <div class="form-group"><label>Full Name <span class="required">*</span></label><input type="text" id="name2" required></div>
            <div class="row">
                <div class="form-group"><label>Birth Date <span class="required">*</span></label><input type="date" id="birthDate2" required></div>
                <div class="form-group"><label>Birth Time <span class="optional">(optional)</span></label><input type="time" id="birthTime2"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Birth City <span class="required">*</span></label><input type="text" id="city2" required></div>
                <div class="form-group"><label>Birth Country <span class="required">*</span></label>
                    <select id="country2" required><option value="">Select</option><option>USA</option><option>UK</option><option>Canada</option><option>Australia</option><option>Singapore</option><option>Malaysia</option></select>
                </div>
            </div>
        </div>
        
        <button type="button" onclick="showCouplePreview()">🔮 Get Compatibility Preview</button>
        
        <div id="previewSection" class="preview-section">
            <hr>
            <div id="previewContent"></div>
            <hr>
            <div class="donation-options">
                <a href="#" id="donateCoupleBtn" class="donation-btn">💑 Donate $9<br><small>Full Compatibility Report</small></a>
            </div>
            <div class="share-buttons" id="shareButtons" style="display: none;">
                <p>✨ Share your compatibility ✨</p>
                <a href="#" id="shareTwitter" class="share-btn share-twitter">🐦 Twitter</a>
                <a href="#" id="shareFacebook" class="share-btn share-facebook">📘 Facebook</a>
                <a href="#" id="shareWhatsApp" class="share-btn share-wa">💬 WhatsApp</a>
            </div>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>
    
    <script>
        function getZodiac(year) {
            const animals = ['Monkey', 'Rooster', 'Dog', 'Pig', 'Rat', 'Ox', 'Tiger', 'Rabbit', 'Dragon', 'Snake', 'Horse', 'Goat'];
            return animals[year % 12];
        }
        
        function getElement(year) {
            const elements = ['Wood', 'Wood', 'Fire', 'Fire', 'Earth', 'Earth', 'Metal', 'Metal', 'Water', 'Water'];
            return elements[year % 10];
        }
        
        function getCompatibility(zodiac1, zodiac2) {
            const compatible = {
                'Rat': ['Dragon', 'Monkey', 'Ox'], 'Ox': ['Snake', 'Rooster', 'Rat'], 'Tiger': ['Horse', 'Dog', 'Pig'],
                'Rabbit': ['Goat', 'Pig', 'Dog'], 'Dragon': ['Rat', 'Monkey', 'Rooster'], 'Snake': ['Ox', 'Rooster', 'Monkey'],
                'Horse': ['Tiger', 'Dog', 'Goat'], 'Goat': ['Rabbit', 'Pig', 'Horse'], 'Monkey': ['Rat', 'Dragon', 'Snake'],
                'Rooster': ['Ox', 'Snake', 'Dragon'], 'Dog': ['Tiger', 'Horse', 'Rabbit'], 'Pig': ['Rabbit', 'Goat', 'Tiger']
            };
            if (zodiac1 === zodiac2) return { score: 70, text: "Same zodiac — you understand each other well but need to avoid competition." };
            if (compatible[zodiac1]?.includes(zodiac2)) return { score: 92, text: "Beautiful match! Natural harmony and mutual support." };
            return { score: 65, text: "Good potential with understanding and effort. Opposites can attract!" };
        }
        
        function generateSessionId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        function showCouplePreview() {
            const email = document.getElementById('email1').value;
            const name1 = document.getElementById('name1').value;
            const name2 = document.getElementById('name2').value;
            const date1 = document.getElementById('birthDate1').value;
            const date2 = document.getElementById('birthDate2').value;
            const city1 = document.getElementById('city1').value;
            const city2 = document.getElementById('city2').value;
            const country1 = document.getElementById('country1').value;
            const country2 = document.getElementById('country2').value;
            
            if (!email || !name1 || !name2 || !date1 || !date2 || !city1 || !city2 || !country1 || !country2) {
                alert('Please fill in all required fields (*) for both people');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                alert('Please enter a valid email address');
                return;
            }
            
            const year1 = parseInt(date1.split('-')[0]);
            const year2 = parseInt(date2.split('-')[0]);
            const zodiac1 = getZodiac(year1);
            const zodiac2 = getZodiac(year2);
            const element1 = getElement(year1);
            const element2 = getElement(year2);
            const compat = getCompatibility(zodiac1, zodiac2);
            
            const previewHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 48px;">💑✨</div>
                    <h3 style="color: #d46b5e;">${name1} & ${name2}</h3>
                    <p style="color: #999; font-size: 12px; margin-bottom: 16px;">📧 Report will be sent to: ${email}</p>
                    <div style="margin: 24px 0; background: white; padding: 24px; border-radius: 20px;">
                        <p>🐱 ${name1}: <strong>${zodiac1}</strong> (${element1})</p>
                        <p>🐱 ${name2}: <strong>${zodiac2}</strong> (${element2})</p>
                        <div style="margin-top: 20px; font-size: 48px;">💖</div>
                        <p style="font-size: 32px; font-weight: 600; margin: 10px 0; color: #d46b5e;">${compat.score}%</p>
                        <p>${compat.text}</p>
                    </div>
                    <p style="margin-top: 20px; font-size: 14px; color: #d46b5e;">
                        ✨ Full report includes: detailed compatibility breakdown, conflict areas, lucky dates for marriage, and 2026 forecasts for both. ✨
                    </p>
                </div>
            `;
            
            document.getElementById('previewContent').innerHTML = previewHTML;
            document.getElementById('previewSection').style.display = 'block';
            document.getElementById('shareButtons').style.display = 'block';
            
            // Generate session ID
            const sessionId = generateSessionId();
            
            // Store couple data
            const coupleData = {
                sessionId: sessionId,
                email: email,
                person1: { name: name1, birthDate: date1, birthTime: document.getElementById('birthTime1').value, birthPlace: `${city1}, ${country1}`, zodiac: zodiac1, element: element1 },
                person2: { name: name2, birthDate: date2, birthTime: document.getElementById('birthTime2').value, birthPlace: `${city2}, ${country2}`, zodiac: zodiac2, element: element2 },
                compatibility: compat.score,
                reportType: 'couple'
            };
            
            localStorage.setItem(`pending_${sessionId}`, JSON.stringify(coupleData));
            
            // Ko-fi donation link
            const kofiUsername = 'nhomme';
            document.getElementById('donateCoupleBtn').href = `https://ko-fi.com/${kofiUsername}?amount=9&message=Couple%20Reading%20for%20${encodeURIComponent(email)}%20Session:${sessionId}`;
            
            // Share buttons
            const siteUrl = window.location.origin;
            const shareText = `We just got our couple reading from The Order of the White Cat! 🐱💑 We're ${compat.score}% compatible. Get yours here: ${siteUrl}`;
            document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
            document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(siteUrl)}&quote=${encodeURIComponent(shareText)}`;
            document.getElementById('shareWhatsApp').href = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
        }
    </script>
</body>
</html>
